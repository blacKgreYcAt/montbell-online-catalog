<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#f3f4f6"/>

  <!-- 邊框 -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#d1d5db" stroke-width="2"/>

  <!-- Montbell 官方商標 (頂部中央) -->
  <image href="/montbell-logo.svg" x="50" y="20" width="300" height="70" preserveAspectRatio="xMidYMid meet"/>

  <!-- 相機圖標 -->
  <g transform="translate(200, 200)">
    <!-- 相機外殼 -->
    <rect x="-40" y="-35" width="80" height="70" rx="8" fill="none" stroke="#9ca3af" stroke-width="2"/>

    <!-- 鏡頭 -->
    <circle cx="0" cy="-10" r="25" fill="none" stroke="#9ca3af" stroke-width="2"/>
    <circle cx="0" cy="-10" r="18" fill="none" stroke="#d1d5db" stroke-width="1"/>

    <!-- 閃光燈 -->
    <rect x="20" y="-30" width="12" height="10" rx="2" fill="#d1d5db"/>
  </g>

  <!-- 文字 -->
  <text x="200" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#6b7280">
    暫無商品圖
  </text>

  <!-- 副文字 -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#9ca3af">
    此顏色暫無圖片
  </text>
</svg>
